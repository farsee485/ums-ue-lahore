version: '3.8'
services:
  auth-service:
    build: ./auth-service
    ports:
      - '8001:8001'
    environment:
      - DATABASE_URL=postgresql://user:pass@postgres:5432/auth_db
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - auth-service
